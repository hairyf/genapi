# yaml-language-server: $schema=https://unpkg.com/undocs/schema/config.json
name: genapi
shortDescription: Lightweight API code generator—only the code you need, nothing extra.
description: A lightweight API code generator that generates only the code you want from OpenAPI and other specs, with no bloat.
github: hairyf/genapi
url: 'https://genapi.hairyf.com'
lang: en
themeColor: yellow
landing:
  contributors: true
  features:
    - title: Multiple HTTP Clients
      icon: 🚀
      description: Support for axios, fetch, ky, got, ofetch, uni and more HTTP clients
    - title: TypeScript/JavaScript
      icon: 🔄
      description: Generate both TypeScript and JavaScript API code
    - title: Flexible & Customizable
      icon: 🛠️
      description: Flexible pipeline system for customizing the generation process
    - title: Multiple Data Sources
      icon: 📋
      description: Support for OpenAPI 2.0/3.x, Swagger and other input sources
automd: true
